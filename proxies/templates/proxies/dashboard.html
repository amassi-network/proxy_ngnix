{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Proxy Manager</title>
</head>
<body>
<div class="container mt-4">
    <h1>Proxys HTTPS</h1>
    <a class="btn btn-primary" href="{% url 'proxy_create' %}">Nouveau proxy</a>
    <table class="table mt-3">
        <thead>
            <tr>
                <th>Domaine</th>
                <th>Backend</th>
                <th>Actif</th>
                <th>Expiration</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in proxies %}
            <tr class="table-{{ p.alert }}">
                <td>{{ p.domain }}</td>
                <td>{{ p.backend }}</td>
                <td>{{ p.active }}</td>
                <td>{% if p.cert_expiration %}{{ p.cert_expiration.date }}{% endif %}</td>
                <td>
                    <a href="{% url 'proxy_edit' p.pk %}">Modifier</a> |
                    <a href="{% url 'proxy_delete' p.pk %}">Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5">Aucun proxy</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
